// ── Calendar export (.ics) ────────────────────────────────────
function exportCalendarICS(){
  var events=[];
  // Personal + shared events the user created
  S.myEvents.forEach(function(ev){events.push(ev);});
  // AI pinned events
  S.aiResults.filter(function(ev){return ev.pinned;}).forEach(function(ev){events.push(ev);});
  if(!events.length){alert('No events to export. Add events or pin some from search first.');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SquadCal//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.forEach(function(ev){
    var uid=(ev.id||Math.random().toString(36).slice(2))+'@squadcal';
    var now=new Date().toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';
    // Build start/end dates
    var start,end;
    if(ev.startDate){
      start=ev.startDate.replace(/-/g,'');
      end=(ev.endDate||ev.startDate).replace(/-/g,'');
      // Bump end by 1 day (DTEND is exclusive for all-day events)
      var endD=new Date(ev.endDate||ev.startDate);endD.setDate(endD.getDate()+1);
      end=endD.toISOString().slice(0,10).replace(/-/g,'');
    } else {
      var y=ev.y||2026,m=String((ev.m||0)+1).padStart(2,'0'),d1=String(ev.d1||1).padStart(2,'0'),d2=String(ev.d2||ev.d1||1).padStart(2,'0');
      start=y+m+d1;
      // End is exclusive
      var endDate=new Date(y,(ev.m||0),(ev.d2||ev.d1||1)+1);
      end=endDate.getFullYear()+String(endDate.getMonth()+1).padStart(2,'0')+String(endDate.getDate()).padStart(2,'0');
    }
    var summary=ev.name||'Event';
    var location=ev.loc||ev.location||'';
    var desc=[(ev.type||''),(ev.note||''),(ev.url||'')].filter(Boolean).join(' | ');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid);
    lines.push('DTSTAMP:'+now);
    lines.push('DTSTART;VALUE=DATE:'+start);
    lines.push('DTEND;VALUE=DATE:'+end);
    lines.push('SUMMARY:'+summary.replace(/[,;\\]/g,'\\$&'));
    if(location)lines.push('LOCATION:'+location.replace(/[,;\\]/g,'\\$&'));
    if(desc)lines.push('DESCRIPTION:'+desc.replace(/[,;\\]/g,'\\$&'));
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='squadcal-events.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

var tripSummaryCache={}; // cache by event name+location

async function fetchTripSummary(ev){
  if(!S.tripModal)return;
  var cacheKey=(ev.name||'')+'|'+(ev.loc||ev.location||'');
  // Return cached result immediately
  if(tripSummaryCache[cacheKey]){S.tripModal.aiSummary=tripSummaryCache[cacheKey];S.tripModal.aiSummaryLoading=false;render();return;}
  S.tripModal.aiSummaryLoading=true;render();
  var city=evCity(ev);var dates=evDateRange(ev);
  var nights=Math.max(1,Math.round((new Date(dates.checkout)-new Date(dates.checkin))/(1000*60*60*24)));
  var prompt='Give a short practical travel summary for someone attending "'+ev.name+'" in '+city+' ('+dates.checkinFmt+(nights>1?' to '+dates.checkoutFmt:'')+', '+nights+' night'+(nights>1?'s':'')+').\n\nInclude in 4-5 sentences: what the destination is like at that time of year (weather/vibe), 1-2 tips specific to the event, what accommodation area to aim for, and one thing to book in advance. Be specific and realistic, not generic. End with a rough budget range per person (excluding flights) in EUR.\n\nRespond in plain text only, no headers, no bullet points.';
  try{
    var gr=await fetch(GEMINI_PROXY,{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(S.authToken||SB_KEY)},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:300}})});
    if(gr.ok){
      var gd=await gr.json();
      var txt=((gd.candidates||[])[0]&&gd.candidates[0].content&&gd.candidates[0].content.parts||[]).filter(function(p){return p.text;}).map(function(p){return p.text;}).join('').trim();
      if(txt&&S.tripModal){tripSummaryCache[cacheKey]=txt;S.tripModal.aiSummary=txt;S.tripModal.aiSummaryLoading=false;render();return;}
    }
  }catch(ex){}
  if(S.tripModal){S.tripModal.aiSummaryLoading=false;render();}
}

// Budget estimator — rough heuristic based on destination + duration
function estimateBudget(ev,guests,nights){
  var loc=(ev.loc||ev.location||'').toLowerCase();
  // Very rough price tiers by region
  var tier=2; // default medium
  if(/monaco|paris|zurich|oslo|stockholm|copenhagen|london|amsterdam/.test(loc))tier=3;
  else if(/prague|warsaw|budapest|zagreb|lisbon|madrid|rome|berlin|barcelona/.test(loc))tier=1;
  else if(/morocco|turkey|albania|serbia|georgia/.test(loc))tier=0;
  var hotelPerNight=[60,90,130,200][tier];
  var mealPerDay=[25,40,60,90][tier];
  var activitiesTotal=[30,60,100,150][tier];
  var flightEst=[80,130,180,250][tier];
  var hotel=hotelPerNight*nights;
  var meals=mealPerDay*nights;
  var total=flightEst+hotel+meals+activitiesTotal;
  // Add event tickets if priceMin known
  var tickets=(ev.priceMin!=null&&ev.priceMin>0)?ev.priceMin:0;
  return{flightEst:flightEst,hotel:hotel,meals:meals,activities:activitiesTotal,tickets:tickets,total:total+(tickets/guests),nights:nights,hotelPerNight:hotelPerNight};
}

function mkCell(dn,y,m,cls,minh,otherMonth){

  var isBusy=isBusyForMe(y,m,dn);var isT=dn===NOW.getDate()&&m===NOW.getMonth()&&y===NOW.getFullYear();

    var dots=el('div','sqdots');

  if(!otherMonth){
    var evs=getEvOnDay(y,m,dn);
    evs.forEach(function(ev){
      var isSuggested=!!ev.aiResult;

      var pill=el('div','epill'+(isSuggested?' suggested':''));

        pill.textContent=contText;

      (function(ev2){on(pill,'click',function(e){e.stopPropagation();ss({modal:ev2});});})(ev);
      cell.appendChild(pill);
    });
    // Day note pill
    var noteKey=dKey(y,m,dn);

      var np=el('div','day-note-pill');np.textContent=S.personalNotes[noteKey];np.title='Personal: '+S.personalNotes[noteKey];
      np.style.borderLeftColor=userColor(userName());
      on(np,'click',function(e){e.stopPropagation();openDayNote(y,m,dn,S.personalNotes[noteKey]||'',false);});
      cell.appendChild(np);
    }
    // Shared group note (visible to all)
    if(S.dayNotes&&S.dayNotes[noteKey]){
      var np2=el('div','day-note-pill');np2.textContent=S.dayNotes[noteKey];np2.title='Group: '+S.dayNotes[noteKey];
      np2.style.borderLeftColor='var(--g)';np2.style.color='var(--g)';
      on(np2,'click',function(e){e.stopPropagation();openDayNote(y,m,dn,S.dayNotes[noteKey]||'',true);});
      cell.appendChild(np2);
    }
    if(busyEntries.length&&mc2>1)ap(cell,mk('div','bchip',busyEntries.length+' busy'));
  }
  var tip=null;
  function removeTip(){if(tip){tip.remove();tip=null;}}
  if(busyEntries.length&&!otherMonth){
    on(cell,'mouseenter',function(e){
      removeTip();
      tip=el('div','ctip');
      tip.style.left=Math.min(e.clientX+10,window.innerWidth-160)+'px';
      tip.style.top=Math.max(e.clientY-10,10)+'px';
      busyEntries.forEach(function(en){var row=el('div','ctip-row');var d2=el('div','ctip-dot');var mc3=userColor(en.name);d2.style.background=mc3;ap(row,d2,mk('span','',en.name,{fontWeight:'600',color:'#111'}),mk('span','','busy',{color:mc3,marginLeft:'auto'}));tip.appendChild(row);});
      S.members.forEach(function(mem){if(!busyEntries.find(function(e){return e.name===mem.name;})){var row=el('div','ctip-row');var d2=el('div','ctip-dot');d2.style.background='var(--g)';ap(row,d2,mk('span','',mem.name,{fontWeight:'600',color:'#111'}),mk('span','','free',{color:'var(--g)',marginLeft:'auto'}));tip.appendChild(row);}});
      document.body.appendChild(tip);
    });
    on(cell,'mouseleave',removeTip);
    on(cell,'mousedown',removeTip);
    on(cell,'touchstart',removeTip);
    on(cell,'click',removeTip);
  }
  var touchMoved=false;
  on(cell,'click',function(e){
    if(e.target.classList.contains('epill'))return;
    if(e.target.classList.contains('day-note-pill'))return;
    if(touchMoved)return;
    // On touch devices: show day sheet with member status + toggle
    // On desktop: toggle busy/free directly (hover tooltip already shows status)
    if(window.matchMedia('(hover:none)').matches){
      openDaySheet(y,m,dn);
    } else {
      toggleDay(y,m,dn);
    }
  });
  on(cell,'contextmenu',function(e){e.preventDefault();openDayMenu(y,m,dn,e.clientX,e.clientY);});
  var pressTimer=null;

  on(cell,'touchmove',function(){touchMoved=true;clearTimeout(pressTimer);});
  on(cell,'touchend',function(){clearTimeout(pressTimer);});
  if(isT)cell.dataset.today='1';
  return cell;
}

  for(var b=3;b>0;b--){var pm2=cur.m===0?11:cur.m-1,py2=cur.m===0?cur.y-1:cur.y;months.unshift({y:py2,m:pm2});cur={y:py2,m:pm2};}

  function updateLabel(){

    if(!best){
      // fallback: closest to top
      for(var j=0;j<labels.length;j++){
        var r2=labels[j].getBoundingClientRect();
        var d2=Math.abs(r2.top-scrTop);
        if(d2<bestDist){bestDist=d2;best=labels[j];}

      months.push({y:ny2,m:nm2});
      scr.appendChild(renderMonthBlock(ny2,nm2));
    }

    // Prepend months at top — anchor scroll to a known element
    if(scr.scrollTop<300&&months.length){
      var first=months[0];
      var pm2=first.m===0?11:first.m-1,py2=first.m===0?first.y-1:first.y;

      var frag=document.createDocumentFragment();
      frag.appendChild(renderMonthBlock(py2,pm2));
      scr.insertBefore(frag,scr.firstChild);
      // After insert, restore the anchor element to same visual position
      if(anchor){
        var newAnchorTop=anchor.getBoundingClientRect().top;

      }
    }
  });
  wrap.appendChild(scr);return wrap;
}

function getNavLabel(){var v=S.view;if(v==='day'){var d=S.wanchor;return DN[(d.getDay()+6)%7]+' '+d.getDate()+' '+MS[d.getMonth()];}if(v==='week'){var ws=wkStart(S.wanchor);var we=addDays(ws,6);return MS[ws.getMonth()]+' '+ws.getDate()+'–'+we.getDate();}if(v==='month')return MN[S.mo]+' '+S.yr;if(v==='season')return 'Summer '+S.yr;if(v==='custom'){if(!S.cmos.length)return 'Custom';return S.cmos.slice(0,3).map(function(m){return MS[m];}).join(', ')+(S.cmos.length>3?'…':'');}}
function getViewName(){return{day:'Day',week:'Week',month:'Month',season:'Season',custom:'Custom'}[S.view]||'Month';}
function navPrev(){

function goToday(){
  S.wanchor=new Date(NOW);S.mo=NOW.getMonth();S.yr=NOW.getFullYear();
  if(S.view==='month'){
    scrollToMonthLabel(S.yr,S.mo,true);
    var nlbl=document.querySelector('.nlbl');if(nlbl)nlbl.textContent=MN[S.mo]+' '+S.yr;

function scrollToMonthLabel(y,m,toToday){
  var scr=document.querySelector('.calscroll');
  if(!scr){render();return;}
  if(toToday){
    var tc=scr.querySelector('[data-today="1"]');
    if(tc){tc.scrollIntoView({block:'center',behavior:'smooth'});return;}
    render();return;
  }
  // Find existing label
  var label=scr.querySelector('[data-monthlabel="'+y+'-'+m+'"]');
  if(label){
    label.scrollIntoView({block:'start',behavior:'smooth'});return;
  }
  // Month not in DOM yet — append or prepend it
  var allLabels=scr.querySelectorAll('[data-monthlabel]');
  if(!allLabels.length){render();return;}
  var target=new Date(y,m,1);
  var firstLabel=allLabels[0];var lastLabel=allLabels[allLabels.length-1];
  var firstParts=firstLabel.dataset.monthlabel.split('-');
  var firstDate=new Date(parseInt(firstParts[0]),parseInt(firstParts[1]),1);
  if(target<firstDate){
    // Need to prepend — add months until we reach target
    var cur=new Date(firstDate);cur.setMonth(cur.getMonth()-1);
    var frag=document.createDocumentFragment();
    var toAdd=[];
    while(cur>=target){toAdd.unshift({y:cur.getFullYear(),m:cur.getMonth()});cur.setMonth(cur.getMonth()-1);}
    var prevH=scr.scrollHeight,prevT=scr.scrollTop;
    toAdd.forEach(function(mo){frag.appendChild(renderMonthBlock(mo.y,mo.m));});
    scr.insertBefore(frag,scr.firstChild);
    scr.scrollTop=prevT+(scr.scrollHeight-prevH);
  } else {
    // Need to append
    var cur2=new Date(lastLabel.dataset.monthlabel.split('-')[0],parseInt(lastLabel.dataset.monthlabel.split('-')[1])+1,1);
    while(cur2<=target){
      scr.appendChild(renderMonthBlock(cur2.getFullYear(),cur2.getMonth()));
      cur2.setMonth(cur2.getMonth()+1);
    }
  }
  // Now scroll to it
  setTimeout(function(){
    var lbl=scr.querySelector('[data-monthlabel="'+y+'-'+m+'"]');
    if(lbl)lbl.scrollIntoView({block:'start',behavior:'smooth'});
  },50);
}

// View dropdown
function mkViewDropdown(){
  var wrap=el('div','vdw');
  var vb=el('button','vdbtn');
  vb.textContent=getViewName()+' ▼';

  var menu=el('div','vdmenu');
  menu.style.display='none';
  var open=false;

  function openMenu(){
    open=true;vb.className='vdbtn op';
    menu.style.display='block';
    // Update checkmarks
    menu.querySelectorAll('.vdi').forEach(function(item){
      var id=item.dataset.view;
      if(id){item.className='vdi'+(S.view===id?' ac':'');item.querySelector('.vdck').textContent=S.view===id?'✓':'';}
    });
  }
  function closeMenu(){open=false;vb.className='vdbtn';menu.style.display='none';}

  on(vb,'click',function(e){
    e.stopPropagation();
    if(open)closeMenu();else openMenu();
  });

  function pickView(v){
    closeMenu();
    S.view=v;S.showdd=false;S.showmp=false;
    render();
  }

  // Build menu items once
  var s1=el('div','vdsec');ap(s1,mk('div','vdsl','Standard'));
  [{id:'day',l:'Day'},{id:'week',l:'Week'},{id:'month',l:'Month'}].forEach(function(v){
    var item=el('div','vdi'+(S.view===v.id?' ac':''));
    item.dataset.view=v.id;
    var ck=mk('span','vdck',S.view===v.id?'✓':'');
    ap(item,ck,mk('span','',v.l));
    on(item,'click',function(e){e.stopPropagation();pickView(v.id);});
    s1.appendChild(item);
  });menu.appendChild(s1);

  var s2=el('div','vdsec');ap(s2,mk('div','vdsl','Multi-month'));
  var views2=[{id:'season',l:'Season (Jun–Aug)'},{id:'custom',l:'Custom months…'}];
  views2.forEach(function(v){
    var item=el('div','vdi'+(S.view===v.id?' ac':''));
    item.dataset.view=v.id;
    var ck=mk('span','vdck',S.view===v.id?'✓':'');
    ap(item,ck,mk('span','',v.l));
    on(item,'click',function(e){e.stopPropagation();pickView(v.id);});
    s2.appendChild(item);
  });menu.appendChild(s2);

  // Close on outside click — only one listener, no render()
  function outsideClick(e){
    if(!wrap.contains(e.target)){
      closeMenu();
      document.removeEventListener('click',outsideClick,true);
    }
  }
  on(vb,'click',function(){
    if(open)document.addEventListener('click',outsideClick,true);
    else document.removeEventListener('click',outsideClick,true);
  });

  wrap.appendChild(vb);
  wrap.appendChild(menu);
  return wrap;
}

function updateSidebarBestDays(){
  var container=document.getElementById('sb-bestdays');if(!container)return;container.innerHTML='';
  var mc=Math.max(S.members.length,1);
  var months=S.sbMonths.length?S.sbMonths:[S.mo];var yr=S.yr;var allDays=[];
  months.forEach(function(m){
    var start=new Date(yr,m,1),end2=new Date(yr,m+1,0);
    for(var d=new Date(start);d<=end2;d.setDate(d.getDate()+1)){
      var dow=d.getDay();
      if(S.sbWeekendOnly&&dow!==5&&dow!==6&&dow!==0)continue;
      var key=dKey(d.getFullYear(),d.getMonth(),d.getDate());
      var bc=(S.gav[key]||[]).filter(function(e){return e.status==='busy';}).length;
      allDays.push({date:new Date(d),busy:bc});
    }
  });
  if(!allDays.length){container.appendChild(mk('div','','No days match your filters',{fontSize:'11px',color:'var(--mt2)',padding:'4px 0'}));return;}
  allDays.sort(function(a,b){return a.busy-b.busy||a.date-b.date;});
  allDays.slice(0,8).forEach(function(bd){
    var row=el('div','brow');
    var lbl=mk('span','',bd.date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),{fontSize:'11px',fontWeight:'600'});
    // Only show busy count if someone is actually busy — hide "Everyone free" noise
    if(bd.busy>0){
      var st=mk('span','',bd.busy+'/'+mc+' busy',{fontSize:'11px',color:'var(--r)',fontWeight:'600'});
      ap(row,lbl,st);
    } else {
      // Show member dots (free = colored, no red)
      var dots=el('div','',{display:'flex',gap:'3px',alignItems:'center'});
      S.members.slice(0,5).forEach(function(m){
        var d=el('div','');d.style.cssText='width:7px;height:7px;border-radius:50%;background:'+userColor(m.name)+';opacity:.7;';
        dots.appendChild(d);
      });
      ap(row,lbl,dots);
    }
    container.appendChild(row);
  });
}

function mkSquadBrief(){
  var pinnedEvs=S.aiResults.filter(function(e){return e.pinned&&!isPastEv(e);});
  if(!pinnedEvs.length&&S.members.length<2)return null;
  var brief=el('div','brief-card');
  ap(brief,mk('div','brief-title','✦ Squad Brief'));

  // ── EVENT CONFLICTS ──
  var conflicts=[];
  pinnedEvs.forEach(function(ev){
    var free=[],busy=[];
    S.members.forEach(function(mem){
      var isBusy=false;
      var cs=evStart(ev),ce=evEnd(ev);
      if(!isNaN(cs)&&!isNaN(ce)){
        for(var dt=new Date(cs),lim=0;dt<=ce&&lim++<60;dt.setDate(dt.getDate()+1)){
          if((S.gav[dKey(dt.getFullYear(),dt.getMonth(),dt.getDate())]||[]).find(function(e2){return e2.name===mem.name&&e2.status==='busy';})){isBusy=true;break;}
        }
      }
      if(isBusy)busy.push(mem.name);else free.push(mem.name);
    });
    if(busy.length>0)conflicts.push({ev:ev,free:free,busy:busy});
  });

  if(conflicts.length){
    conflicts.forEach(function(cf){
      var item=el('div','brief-item');
      var allBusy=cf.busy.length===S.members.length;
      var icon=mk('div','brief-icon',allBusy?'✗':'⚠️');
      var txt=el('div','brief-text');
      var evName=mk('strong','',cf.ev.name);txt.appendChild(evName);
      txt.appendChild(document.createTextNode(' · '));
      var dateTxt=mk('span','dim',cf.ev.ds||'');txt.appendChild(dateTxt);
      txt.appendChild(document.createElement('br'));
      if(allBusy){
        txt.appendChild(document.createTextNode('Nobody is free — consider rescheduling'));
      } else {
        var busyNames=cf.busy.join(', ');
        var dots=el('span','',{display:'inline-flex',gap:'2px',verticalAlign:'middle'});
        cf.busy.forEach(function(name){
          var d=el('span','');d.style.cssText='display:inline-block;width:12px;height:12px;border-radius:50%;background:'+userColor(name)+';vertical-align:middle;margin-right:2px;';
          d.title=name;dots.appendChild(d);
        });
        txt.appendChild(dots);
        txt.appendChild(document.createTextNode(' '+busyNames+' '+(cf.busy.length===1?'is':'are')+' busy'));
        if(cf.free.length>0){
          txt.appendChild(document.createElement('br'));
          txt.appendChild(mk('span','dim',cf.free.length+' of '+S.members.length+' can make it'));
        }
      }
      ap(item,icon,txt);brief.appendChild(item);
    });
  } else if(pinnedEvs.length){
    var allGoodItem=el('div','brief-item');
    ap(allGoodItem,mk('div','brief-icon','✓'));
    var gtxt=el('div','brief-text');
    gtxt.innerHTML='<strong>All '+pinnedEvs.length+' event'+(pinnedEvs.length>1?'s':'')+' look good</strong> — everyone can make it';
    allGoodItem.appendChild(gtxt);
    brief.appendChild(allGoodItem);
  }

  // ── FREE WINDOWS ──
  if(S.members.length>=2){
    var windows=[];
    var today=new Date();today.setHours(0,0,0,0);
    var checked=0;
    for(var di=1;di<=90&&windows.length<3;di++){
      var d=new Date(today);d.setDate(today.getDate()+di);
      var dow=d.getDay();
      if(dow===0||dow===6)continue; // skip weekends for work windows; actually include
      checked++;
      var dk=dKey(d.getFullYear(),d.getMonth(),d.getDate());
      var busyHere=(S.gav[dk]||[]).filter(function(e){return e.status==='busy';});
      if(busyHere.length===0&&S.members.length>=2){
        windows.push(d);
      }
    }
    // Also find weekend windows
    var weekendWindows=[];
    for(var di2=1;di2<=90&&weekendWindows.length<2;di2++){
      var d2=new Date(today);d2.setDate(today.getDate()+di2);
      var dow2=d2.getDay();
      if(dow2!==5&&dow2!==6&&dow2!==0)continue;
      var dk2=dKey(d2.getFullYear(),d2.getMonth(),d2.getDate());

  var pendingCount=S.isAdmin&&S.pendingMembers?S.pendingMembers.length:0;
  var tabbar=el('div','tabbar');
  ['calendar','events','members'].forEach(function(v){var label=v==='calendar'?'📅 Calendar':v==='events'?'🔍 Events':'👥 Members';var t=mk('button','tab'+(S.tab===v?' on':''),label);if(v==='members'&&pendingCount){var bdg=mk('span','tab-badge',String(pendingCount));t.appendChild(bdg);}on(t,'click',function(){S._evScroll=0;S.showdd=false;S.showmp=false;ss({tab:v});});tabbar.appendChild(t);});main.appendChild(tabbar);

  if(S.tab==='calendar'){
    var tb=el('div','toolbar');var pb=mk('button','nbtn','‹');on(pb,'click',navPrev);var nb2=mk('button','nbtn','›');on(nb2,'click',navNext);var tbtn=mk('button','tbtn','Today');on(tbtn,'click',goToday);
    var nlbl=mk('span','nlbl',getNavLabel());ap(tb,pb,nb2,tbtn,nlbl);tb.appendChild(mkViewDropdown());main.appendChild(tb);
    var hint=mk('div','','Tap a day to set busy / free  •  Long-press or right-click for more',{fontSize:'12px',color:'var(--mt)',padding:'7px 14px',background:'var(--s2)',borderBottom:'1px solid var(--bd)',flexShrink:'0',lineHeight:'1.4'});main.appendChild(hint);
    var calwrap=el('div','',{flex:'1',display:'flex',flexDirection:'column',overflow:'hidden',minHeight:'0'});
    var v2=S.view;
    if(v2==='day'){var ds2=el('div','calscroll');ds2.appendChild(renderDay());calwrap.appendChild(ds2);}
    else if(v2==='week')calwrap.appendChild(renderWeek());
    else if(v2==='month')calwrap.appendChild(renderMonth(S.yr,S.mo));
    else if(v2==='season'){var ss3=el('div','calscroll');ss3.appendChild(renderMulti([{y:S.yr,m:5},{y:S.yr,m:6},{y:S.yr,m:7}]));calwrap.appendChild(ss3);}
    else if(v2==='custom'){var cs3=el('div','calscroll');cs3.appendChild(renderMulti(S.cmos.map(function(m){return{y:S.cyr,m:m};})));calwrap.appendChild(cs3);}
    main.appendChild(calwrap);body.appendChild(main);body.appendChild(mkSidebar());
  } else if(S.tab==='events'){main.appendChild(mkEvents());body.appendChild(main);}
  else{var ms2=el('div','calscroll');ms2.appendChild(mkMembers());main.appendChild(ms2);body.appendChild(main);}
  app.appendChild(body);

  var bnav=el('div','bottom-nav');
  [{v:'calendar',icon:'📅',lbl:'Calendar'},{v:'events',icon:'🔍',lbl:'Events'},{v:'members',icon:'👥',lbl:'Members',badge:pendingCount}].forEach(function(item){var btn2=el('button','bnav-item'+(S.tab===item.v?' on':''));ap(btn2,mk('span','bnav-icon',item.icon),mk('span','',item.lbl));if(item.badge)ap(btn2,mk('span','bnav-badge',String(item.badge)));on(btn2,'click',function(){S._evScroll=0;ss({tab:item.v,showdd:false});});bnav.appendChild(btn2);});
  app.appendChild(bnav);
  }catch(ex){console.error('render error:',ex);var app2=document.getElementById('app');if(app2){app2.innerHTML='<div style="padding:20px;color:red;font-size:12px">Render error: '+ex.message+'</div>';}}
}

// Start
// Global tooltip cleanup — removes any stuck tooltip on scroll/click/drag
document.addEventListener('scroll',function(){document.querySelectorAll('.ctip').forEach(function(t){t.remove();});},true);
document.addEventListener('mousedown',function(){document.querySelectorAll('.ctip').forEach(function(t){t.remove();});});
initAuth();
setInterval(function(){if(S.screen==='app'){loadGav();loadMems();loadSquadEvents();if(S.isAdmin)loadGroupInfo();}if(S.screen==='waiting')checkApprovalStatus();},30000);
// Refresh token every 50 minutes
setInterval(function(){if(S.refreshToken){authRefresh(S.refreshToken).then(function(r){if(r&&r.access_token){saveTokens(r.access_token,r.refresh_token,Date.now()+(r.expires_in||3600)*1000);S.authToken=r.access_token;}});}},50*60*1000);
})();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
