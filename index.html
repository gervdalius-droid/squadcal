<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>SquadCal</title>

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SquadCal">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png">

<!-- Android / theme -->
<meta name="theme-color" content="#5b4cf5">
<meta name="mobile-web-app-capable" content="yes">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

<!-- Description for share/bookmark -->
<meta name="description" content="Plan events with your squad. See who's free — synced live.">
<meta name="application-name" content="SquadCal">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#app{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#f4f2ef;color:#1a1a1a;}
:root{
  --a:#5b4cf5;--a2:#4338ca;--abg:#eeecff;--at:#2d27a0;
  --g:#16a34a;--gbg:#f0fdf4;--gl:#86efac;
  --r:#dc2626;--rbg:#fef2f2;--rl:#fecaca;
  --am:#b45309;--ambg:#fffbeb;--aml:#fde68a;
  --bd:#e8e5e0;--bd2:#d4d0c8;
  --s:#ffffff;--s2:#f9f8f6;--s3:#f4f2ef;
  --mt:#6b6760;--mt2:#b5b1a8;--mt3:#e0ddd7;
  --radius:14px;--radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;max-width:100vw;}

/* TOPBAR */
.topbar{height:56px;background:var(--s);border-bottom:1.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.6px;color:#1a1a1a;}
.logo span{color:var(--a);}
.tr{display:flex;align-items:center;gap:10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--mt2);flex-shrink:0;}
.sync-dot.ok{background:#22c55e;}.sync-dot.err{background:#ef4444;}
.sync-dot.busy{background:#f59e0b;animation:pu 1s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.code-pill{display:flex;align-items:center;gap:5px;background:var(--s2);border:1.5px solid var(--bd);border-radius:20px;padding:5px 12px;cursor:pointer;transition:border-color .15s;}
.code-pill:hover{border-color:var(--a);}
.cl{font-size:9px;color:var(--mt2);text-transform:uppercase;letter-spacing:.8px;font-weight:500;}
.cv{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--am);font-family:'DM Mono',monospace;}
.cc{font-size:10px;color:var(--mt2);}
.gbadge{display:flex;align-items:center;gap:6px;background:var(--s2);border:1.5px solid var(--bd);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;color:var(--mt);cursor:pointer;max-width:150px;overflow:hidden;transition:border-color .15s;}
.gbadge:hover{border-color:var(--a);}
.gbadge span:first-of-type{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ldot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative;border:2px solid var(--bd);}
.badge-dot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#ef4444;border:2px solid var(--s);}
.admin-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--a);color:#fff;font-size:9px;font-weight:700;margin-left:4px;flex-shrink:0;}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;max-width:100vw;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.sidebar{display:none;width:248px;flex-shrink:0;background:var(--s);border-left:1.5px solid var(--bd);overflow-y:auto;padding:16px;}
@media(min-width:800px){.sidebar{display:block;}}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--s);border-top:1.5px solid var(--bd);flex-shrink:0;}
@media(min-width:600px){.bottom-nav{display:none;}}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;font-size:10px;font-weight:500;color:var(--mt2);gap:3px;border:none;background:transparent;font-family:inherit;position:relative;transition:color .15s;}
.bnav-item.on{color:var(--a);}
.bnav-icon{font-size:21px;line-height:1;}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:#ef4444;color:#fff;font-size:8px;font-weight:700;border-radius:10px;padding:1px 4px;min-width:14px;text-align:center;}

/* TABS */
.tabbar{display:none;align-items:center;gap:4px;padding:10px 16px;border-bottom:1.5px solid var(--bd);background:var(--s);flex-shrink:0;}
@media(min-width:600px){.tabbar{display:flex;}}
.tab{border:1.5px solid transparent;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--mt);font-family:inherit;position:relative;transition:all .15s;}
.tab.on{background:var(--a);color:#fff;border-color:var(--a);}
.tab:not(.on):hover{background:var(--s2);color:#1a1a1a;border-color:var(--bd);}
.tab-badge{background:#ef4444;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;margin-left:4px;vertical-align:middle;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1.5px solid var(--bd);background:var(--s);flex-shrink:0;}
.nbtn{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s);color:var(--mt);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;}
.nbtn:hover{background:var(--s2);border-color:var(--bd2);}
.tbtn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s);color:#1a1a1a;cursor:pointer;font-family:inherit;transition:all .15s;}
.tbtn:hover{background:var(--s2);}
.nlbl{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;letter-spacing:-.3px;}

/* VIEW DROPDOWN */
.vdw{position:relative;}
.vdbtn{display:flex;align-items:center;gap:5px;border:1.5px solid var(--bd);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;background:var(--s);color:#1a1a1a;font-family:inherit;transition:all .15s;}
.vdbtn.op{border-color:var(--a);color:var(--a);}
.vdmenu{position:absolute;top:calc(100% + 6px);right:0;background:var(--s);border:1.5px solid var(--bd);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:300;min-width:210px;overflow:hidden;}
.vdsec{padding:4px 0;}.vdsec+.vdsec{border-top:1px solid var(--mt3);}
.vdsl{font-size:10px;font-weight:600;color:var(--mt2);text-transform:uppercase;letter-spacing:.8px;padding:6px 14px 3px;}
.vdi{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;color:#1a1a1a;transition:background .1s;}
.vdi:hover,.vdi:active{background:var(--s2);}
.vdi.ac{background:var(--abg);color:var(--at);}
.vdck{font-size:12px;color:var(--a);width:14px;text-align:center;}
.mpi{padding:12px 14px;}
.mpyr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mpyrl{font-size:13px;font-weight:600;}
.mpyrb{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s2);color:var(--mt);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.mpgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.mpm{border:1.5px solid var(--bd);border-radius:10px;padding:8px 3px;font-size:11px;cursor:pointer;background:var(--s2);color:var(--mt);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s;font-weight:500;}
.mpm.on{border-color:var(--a);background:var(--abg);color:var(--at);}
.mpck{width:11px;height:11px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;}
.mpps{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:7px;}
.mppsb{border:1.5px solid var(--bd);border-radius:8px;padding:5px 3px;font-size:10px;cursor:pointer;background:var(--s);color:#555;font-family:inherit;text-align:center;font-weight:500;transition:all .15s;}
.mppsb:hover{background:var(--s2);}
.mpapply{width:100%;border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;}

/* CALENDAR */
.calscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.dayhdrs{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s);flex-shrink:0;position:sticky;top:0;z-index:10;padding:0;border-bottom:1px solid var(--mt3);}
.dayhdr{text-align:center;font-size:10px;font-weight:600;color:var(--mt2);padding:8px 0 6px;text-transform:uppercase;letter-spacing:.8px;}

/* Month grid — Apple Calendar style: seamless, borders via cell borders */
.mongrid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;padding:0;}

.mc{
  padding:6px 7px 5px;
  cursor:pointer;
  min-height:88px;
  display:flex;
  flex-direction:column;
  background:var(--s);
  position:relative;
  transition:background .12s;
  border-right:1px solid var(--mt3);
  border-bottom:1px solid var(--mt3);
}
.mc:nth-child(7n){border-right:none;}
.mongrid{overflow:hidden;}
@media(min-width:600px){.mc{min-height:104px;padding:8px 9px 6px;}}
.mc:hover{background:#faf9f7;}
.mc.other-month{background:var(--s);}
.mc.other-month .dn{color:var(--mt3);}
.mc.mc-empty{background:var(--s2);border-color:var(--mt3);cursor:default;pointer-events:none;}
.mc.busy{background:var(--s);}
.mc.today{background:var(--s);}

/* Day number — large, typographic */
.dnrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.dn{
  font-size:13px;
  font-weight:500;
  color:var(--mt);
  width:26px;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  line-height:1;
  flex-shrink:0;
}
@media(min-width:600px){.dn{font-size:14px;width:28px;height:28px;}}
.mc.today .dn{background:var(--a);color:#fff;font-weight:700;}
.mc.busy .dn{color:var(--r);}
.mc.today.busy .dn{background:var(--r);color:#fff;}

/* Busy label — tiny, right-aligned */
.dspill{font-size:8px;font-weight:500;color:var(--r);opacity:.7;letter-spacing:.2px;}

/* Squad member dots — refined row */
.sqdots{display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap;}
.sqdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:.85;}

/* Event pills — full width bars, no border radius on left, colored accent */
.epill{
  font-size:9px;
  padding:2px 6px;
  border-radius:3px;
  margin-top:1px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:pointer;
  font-weight:600;
  letter-spacing:.1px;
  border:none;
  border-left:2px solid;
  display:block;
}
.epill.suggested{
  border:1.5px dashed;
  border-left:2px solid;
  background:transparent !important;
  opacity:.85;
}
@media(min-width:600px){.epill{font-size:10px;padding:2px 7px;}}

/* Day note — clean muted line */
.day-note-pill{
  font-size:9px;
  padding:1px 4px;
  margin-top:2px;
  background:transparent;
  border:none;
  color:var(--mt2);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:pointer;
  font-weight:400;
  line-height:1.4;
  display:block;
}

/* Busy count chip */
.bchip{font-size:8px;color:var(--r);margin-top:auto;padding-top:3px;font-weight:500;opacity:.8;}

/* Month label */
.monthlabel-row{
  display:flex;align-items:baseline;gap:8px;
  padding:22px 4px 8px;
  background:var(--s);
  border-bottom:1px solid var(--mt3);
}
.monthlabel-month{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px;}
.monthlabel-year{font-size:14px;font-weight:400;color:var(--mt2);}

/* Tooltip */
.ctip{position:fixed;background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.12);font-size:12px;min-width:160px;}
.ctip-row{display:flex;align-items:center;gap:9px;margin-bottom:5px;}
.ctip-row:last-child{margin-bottom:0;}
.ctip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* Toolbar refinements */
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--s);flex-shrink:0;}
.nbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--mt);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:inherit;}
.nbtn:hover{background:var(--s2);color:#1a1a1a;}
.tbtn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mt);cursor:pointer;font-family:inherit;transition:all .12s;}
.tbtn:hover{background:var(--s2);color:#1a1a1a;}
.nlbl{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;letter-spacing:-.4px;}

/* CONTEXT MENU */
.daymenu{position:fixed;background:var(--s);border:1.5px solid var(--bd);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:1000;min-width:200px;overflow:hidden;padding:5px 0;}
.daymenu-header{padding:7px 14px 5px;font-size:10px;font-weight:600;color:var(--mt2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--mt3);margin-bottom:3px;}
.daymenu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a;transition:background .1s;}
.daymenu-item:hover,.daymenu-item:active{background:var(--s2);}
.daymenu-item .dmi-icon{font-size:16px;width:22px;text-align:center;}
.daymenu-sep{height:1px;background:var(--mt3);margin:4px 0;}

/* EVENTS */
.evlayout{display:flex;flex:1;overflow:hidden;min-height:0;}
.evpanel{width:210px;flex-shrink:0;border-right:1.5px solid var(--bd);padding:14px;overflow-y:auto;background:var(--s2);display:none;}
@media(min-width:700px){.evpanel{display:block;}}
.evlist{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.evcard{border:1.5px solid var(--bd);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;background:var(--s);box-shadow:var(--shadow);transition:box-shadow .15s;}
.evcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);}
.evcard.past{opacity:.45;background:var(--s2);box-shadow:none;}
.evcard.manual-ev{border-left:3px solid var(--a);}
.evhead{padding:12px 14px 10px;}
.evfoot{padding:8px 14px;border-top:1.5px solid var(--mt3);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;background:var(--s2);}
.bdg{font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;border:1.5px solid;letter-spacing:.2px;}
.bdg-past{background:#f0f0f0;color:#aaa;border-color:var(--mt3);}
.bdg-soon{background:var(--ambg);color:var(--am);border-color:var(--aml);}
.bdg-on{background:var(--gbg);color:var(--g);border-color:var(--gl);}
.bdg-manual{background:var(--abg);color:var(--at);border-color:#c4beff;}
.addbtn{border:1.5px solid var(--bd);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer;background:var(--s);color:var(--mt);font-family:inherit;transition:all .15s;}
.addbtn:hover{border-color:var(--bd2);background:var(--s2);}
.addbtn.on{background:var(--gbg);border-color:var(--gl);color:var(--g);}

/* SEARCH CARD */
.search-card{background:var(--s);border:1.5px solid var(--a);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 0 0 4px var(--abg);}
.search-title{font-size:15px;font-weight:700;color:var(--at);margin-bottom:2px;}
.search-sub{font-size:11px;color:var(--mt);margin-bottom:10px;}
.search-btn{border:none;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;width:100%;margin-top:8px;transition:background .15s,opacity .15s;}
.search-btn:hover{background:var(--a2);}
.search-btn:disabled{opacity:.6;}
.err-box{background:var(--rbg);border:1.5px solid #fca5a5;border-radius:10px;padding:9px 11px;font-size:11px;color:var(--r);margin-top:8px;}

/* MOBILE FILTER */
.mob-filter{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;background:var(--s);border-bottom:1.5px solid var(--bd);flex-shrink:0;-webkit-overflow-scrolling:touch;}
@media(min-width:700px){.mob-filter{display:none;}}
.mob-filter::-webkit-scrollbar{display:none;}
.mob-chip{border:1.5px solid var(--bd);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:500;cursor:pointer;background:var(--s);color:var(--mt);white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .15s;}
.mob-chip.on{border-color:var(--a);background:var(--abg);color:var(--at);}

/* FILTERS */
.fi{border:1.5px solid var(--bd);border-radius:10px;padding:8px 10px;font-size:12px;cursor:pointer;background:var(--s);color:var(--mt);display:flex;align-items:center;gap:6px;margin-bottom:5px;font-weight:500;transition:all .15s;}
.fi:hover{border-color:var(--bd2);}
.fi.on{border-color:var(--a);background:var(--abg);color:var(--at);}
.fick{width:13px;height:13px;border-radius:4px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.mfgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px;}
.mfi{border:1.5px solid var(--bd);border-radius:9px;padding:7px 3px;font-size:10px;cursor:pointer;background:var(--s);color:var(--mt);display:flex;align-items:center;justify-content:center;gap:3px;font-weight:500;transition:all .15s;}
.mfi.on{border-color:var(--a);background:var(--abg);color:var(--at);}
.mfck{width:10px;height:10px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;}
.qbtns{display:flex;gap:5px;margin-bottom:10px;}
.qbtn{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:5px;font-size:10px;font-weight:500;cursor:pointer;background:var(--s);color:#555;font-family:inherit;text-align:center;transition:all .15s;}
.qbtn:hover{background:var(--s2);}
.yrow{display:flex;gap:5px;margin-bottom:10px;}
.ybtn{flex:1;border:1.5px solid var(--bd);border-radius:9px;padding:7px;font-size:11px;cursor:pointer;background:var(--s);color:var(--mt);font-family:inherit;text-align:center;font-weight:600;transition:all .15s;}
.ybtn.on{border-color:var(--a);background:var(--abg);color:var(--at);}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mt2);display:block;margin-bottom:8px;}

/* FORMS */
.mef{background:var(--s);border:1.5px solid var(--a);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.mef-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--at);}
.mef-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.mef-inp{flex:1;min-width:120px;border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--s);color:#1a1a1a;transition:border-color .15s;}
.mef-inp:focus{border-color:var(--a);}
.mef-sel{border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--s);color:#1a1a1a;cursor:pointer;}
.mef-color-row{display:flex;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s;}
.color-swatch.on{border-color:#1a1a1a;transform:scale(1.1);}
.mef-actions{display:flex;gap:8px;}
.mef-save{border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;transition:background .15s;}
.mef-save:hover{background:var(--a2);}
.mef-cancel{border:1.5px solid var(--bd);border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;background:var(--s);color:var(--mt);font-family:inherit;transition:all .15s;}
.mef-cancel:hover{background:var(--s2);}

/* EXPENSE */
.exp-card{border:1.5px solid var(--aml);background:var(--ambg);border-radius:var(--radius);padding:14px;margin-bottom:8px;}
.exp-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.exp-title{font-size:13px;font-weight:700;color:var(--am);}
.exp-total{font-size:18px;font-weight:700;color:var(--am);}
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #fde68a;font-size:12px;}
.exp-row:last-child{border-bottom:none;}
.exp-you{font-weight:700;color:var(--r);}
.exp-settled{font-weight:700;color:var(--g);}
.exp-splitw-btn{display:flex;align-items:center;justify-content:center;gap:7px;border:1.5px solid #1ec8a0;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;background:#f0fdf9;color:#0f7a61;text-decoration:none;margin-top:10px;transition:background .15s;}
.exp-splitw-btn:hover{background:#dcfdf4;}

/* SIDEBAR */
.sbtitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mt2);margin-bottom:10px;}
.brief-card{background:linear-gradient(135deg,var(--abg) 0%,var(--s) 100%);border:1.5px solid var(--a);border-radius:14px;padding:14px 15px;margin-bottom:16px;}
.brief-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--a);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.brief-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.brief-item:last-child{margin-bottom:0;}
.brief-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.brief-text{font-size:11px;color:#1a1a1a;line-height:1.5;flex:1;}
.brief-text strong{font-weight:700;}
.brief-text .dim{color:var(--mt);}
.brief-divider{height:1px;background:var(--a);opacity:.12;margin:8px 0;}
.brief-window{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--s);border-radius:8px;margin-top:4px;border:1px solid var(--bd);}
.brief-window-date{font-size:11px;font-weight:600;color:#1a1a1a;}
.brief-window-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:20px;}
.stgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px;}
.stcell{background:var(--s2);border-radius:var(--radius-sm);padding:10px 12px;border:1.5px solid var(--bd);}
.stval{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;letter-spacing:-.5px;}
.stlbl{font-size:10px;color:var(--mt);font-weight:500;}
.brow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--mt3);}
.pecard{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.pecard:hover{border-color:var(--bd2);box-shadow:var(--shadow);}
.pecard.past{opacity:.4;background:var(--s3);border-color:var(--bd);}

/* MEMBERS */
.memlayout{padding:16px;max-width:580px;}
.memcard{background:var(--s);border:1.5px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.memrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--mt3);}
.memrow:last-child{border-bottom:none;}
.memav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:none;color:#fff;}
.pending-card{background:#fff8f0;border:1.5px solid var(--aml);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.pending-title{font-size:11px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.pending-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--aml);}
.pending-row:last-child{border-bottom:none;}
.approve-btn{border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;background:var(--g);color:#fff;font-family:inherit;transition:opacity .15s;}
.approve-btn:hover{opacity:.85;}
.reject-btn{border:1.5px solid #fca5a5;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--s);color:var(--r);font-family:inherit;}
.remove-btn{border:1.5px solid #fca5a5;border-radius:8px;padding:4px 10px;font-size:10px;cursor:pointer;background:var(--s);color:var(--r);font-family:inherit;}

/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:500;padding:0;}
@media(min-width:500px){.movl{align-items:center;padding:20px;}}
.mbox{background:var(--s);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:420px;box-shadow:0 -12px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto;}
@media(min-width:500px){.mbox{border-radius:var(--radius);box-shadow:var(--shadow-lg);}}
.mbtns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.mbtn{flex:1;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;border:1.5px solid var(--bd);background:var(--s);color:var(--mt);text-decoration:none;display:flex;align-items:center;justify-content:center;min-width:80px;transition:all .15s;}
.mbtn:hover{background:var(--s2);}
.mbtn.on{background:var(--gbg);border-color:var(--gl);color:var(--g);}
.mbtn.ticket{border:none;color:#fff;}
.mbtn.del{border-color:#fca5a5;color:var(--r);}

/* TRIP PLANNER */
.trip-movl{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
@media(min-width:500px){.trip-movl{align-items:center;padding:20px;}}
.trip-box{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
@media(min-width:500px){.trip-box{border-radius:var(--radius);box-shadow:var(--shadow-lg);}}
.trip-header{padding:20px 20px 14px;background:var(--a);color:#fff;border-radius:20px 20px 0 0;}
@media(min-width:500px){.trip-header{border-radius:var(--radius) var(--radius) 0 0;}}
.trip-header-title{font-size:17px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px;}
.trip-header-sub{font-size:12px;opacity:.8;}
.trip-body{padding:18px;}
.trip-ai-summary{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:14px;font-size:12px;line-height:1.75;color:var(--mt);}
.trip-ai-summary.loading{display:flex;align-items:center;gap:9px;color:var(--mt2);}
.trip-budget{background:var(--ambg);border:1.5px solid var(--aml);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:14px;}
.trip-budget-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--am);margin-bottom:9px;}
.trip-budget-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--aml);font-size:12px;}
.trip-budget-row:last-child{border-bottom:none;font-weight:700;font-size:13px;color:var(--am);}
.trip-budget-lbl{color:var(--mt);}
.trip-budget-val{font-weight:600;color:#1a1a1a;}
.trip-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
@media(max-width:400px){.trip-inputs{grid-template-columns:1fr;}}
.trip-inp-group{display:flex;flex-direction:column;gap:5px;}
.trip-inp-lbl{font-size:10px;font-weight:600;color:var(--mt2);text-transform:uppercase;letter-spacing:.6px;}
.trip-inp{border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;background:var(--s2);color:#1a1a1a;width:100%;transition:border-color .15s;}
.trip-inp:focus{border-color:var(--a);background:var(--s);}
.trip-radius-row{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.trip-radius-lbl{font-size:11px;color:var(--mt);white-space:nowrap;font-weight:500;}
.trip-radius-val{font-size:11px;font-weight:700;color:var(--at);min-width:52px;}
.trip-section{margin-bottom:14px;}
.trip-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt2);margin-bottom:9px;}
.trip-cards{display:flex;flex-direction:column;gap:8px;}
.trip-card{border:1.5px solid var(--bd);border-radius:var(--radius-sm);overflow:hidden;background:var(--s);transition:box-shadow .15s;}
.trip-card:hover{box-shadow:var(--shadow);}
.trip-card-head{padding:11px 13px 9px;display:flex;align-items:center;gap:11px;}
.trip-card-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.trip-card-info{flex:1;min-width:0;}
.trip-card-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px;}
.trip-card-desc{font-size:11px;color:var(--mt);}
.trip-card-foot{padding:9px 13px;border-top:1px solid var(--mt3);display:flex;align-items:center;justify-content:flex-end;background:var(--s2);}
.trip-link{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;color:#fff;text-decoration:none;font-family:inherit;transition:opacity .15s;}
.trip-link:hover{opacity:.88;}
.trip-close{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:11px;font-size:13px;cursor:pointer;background:var(--s);color:var(--mt);font-family:inherit;margin-top:6px;font-weight:500;transition:all .15s;}
.trip-close:hover{background:var(--s2);}

/* PREMIUM */
.premium-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px;}
.lock-badge{display:inline-flex;align-items:center;gap:4px;background:var(--s2);color:var(--mt);font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;border:1.5px solid var(--bd);}
.paywall-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:700;padding:0;}
@media(min-width:500px){.paywall-overlay{align-items:center;padding:20px;}}
.paywall-box{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:28px 22px;box-shadow:0 -12px 40px rgba(0,0,0,.2);}
@media(min-width:500px){.paywall-box{border-radius:var(--radius);box-shadow:var(--shadow-lg);}}
.paywall-icon{font-size:38px;margin-bottom:12px;text-align:center;}
.paywall-title{font-size:19px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.4px;}
.paywall-sub{font-size:13px;color:var(--mt);text-align:center;line-height:1.6;margin-bottom:20px;}
.plan-card{border:1.5px solid var(--bd);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.plan-card:hover{border-color:var(--a);}
.plan-card.selected{border:2px solid var(--a);background:var(--abg);}
.plan-card-row{display:flex;align-items:center;justify-content:space-between;}
.plan-name{font-size:14px;font-weight:700;color:#1a1a1a;}
.plan-price{font-size:15px;font-weight:700;color:var(--a);}
.plan-desc{font-size:11px;color:var(--mt);margin-top:4px;}
.plan-save{font-size:10px;background:var(--gbg);color:var(--g);border:1.5px solid var(--gl);padding:2px 8px;border-radius:20px;font-weight:700;}
.upgrade-btn{width:100%;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;margin-top:6px;letter-spacing:-.2px;transition:background .15s;}
.upgrade-btn:hover{background:var(--a2);}
.quota-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.quota-bar{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;}
.quota-fill{height:100%;border-radius:2px;background:var(--a);transition:width .4s;}
.quota-fill.warn{background:#f59e0b;}
.quota-fill.full{background:var(--r);}

/* CALENDAR IMPORT */
.import-box{background:var(--s);border:2px dashed var(--bd2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s;}
.import-box:hover,.import-box.drag{border-color:var(--a);background:var(--abg);}
.import-step{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--mt3);font-size:12px;color:var(--mt);line-height:1.6;}
.import-step:last-child{border-bottom:none;}
.import-step-num{width:22px;height:22px;border-radius:50%;background:var(--a);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

/* DAY NOTE / EVENT QUICK ADD */
.day-note-pill{font-size:9px;padding:2px 6px;margin-top:2px;background:transparent;border:none;border-left:2px solid var(--a);color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:400;line-height:1.4;display:block;padding-left:5px;}
.day-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:470;touch-action:none;}
.day-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom,0);z-index:471;box-shadow:0 -8px 40px rgba(0,0,0,.15);animation:sheetUp .24s cubic-bezier(.32,.72,0,1);}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.day-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:12px auto 0;}
.day-sheet-header{padding:14px 20px 10px;border-bottom:1px solid var(--mt3);}
.day-sheet-date{font-size:16px;font-weight:700;color:#1a1a1a;}
.day-sheet-members{padding:10px 20px;}
.day-sheet-member{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--mt3);}
.day-sheet-member:last-child{border-bottom:none;}
.day-sheet-toggle{margin:12px 20px;display:flex;gap:8px;}
.day-sheet-busy-btn{flex:1;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.conflict-nudge{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--s);border:1.5px solid var(--bd);border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);padding:14px 16px;
  z-index:480;width:calc(100% - 32px);max-width:380px;
  animation:nudgeIn .22s cubic-bezier(.32,.72,0,1);
}
@keyframes nudgeIn{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.nudge-title{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.nudge-sub{font-size:11px;color:var(--mt);margin-bottom:10px;line-height:1.4;}
.nudge-actions{display:flex;gap:8px;}
.nudge-free{flex:1;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;}
.nudge-no{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--s);color:var(--mt);font-family:inherit;}
.day-note-modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
@media(min-width:500px){.day-note-modal{align-items:center;padding:20px;}}
.day-note-box{background:var(--s);border-radius:24px 24px 0 0;width:100%;max-width:460px;padding:0 0 32px;box-shadow:0 -16px 48px rgba(0,0,0,.18);overflow:hidden;}
@media(min-width:500px){.day-note-box{border-radius:20px;padding-bottom:0;}}
.day-note-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;}
.day-note-date{font-size:13px;font-weight:600;color:var(--mt);letter-spacing:-.2px;}
.day-note-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--s2);color:var(--mt);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;}
.day-note-ta{width:100%;border:none;border-top:1.5px solid var(--bd);padding:18px 20px;font-size:17px;font-family:inherit;outline:none;resize:none;min-height:100px;background:var(--s);color:#1a1a1a;line-height:1.5;}
.day-note-ta::placeholder{color:var(--mt2);}
.day-note-actions{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0;border-top:1.5px solid var(--bd);}
.day-note-save{border:none;border-radius:20px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;background:var(--a);color:#fff;font-family:inherit;}
.day-note-del{border:none;background:none;color:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:9px 0;}
/* RECURRING */
.rec-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
@media(min-width:500px){.rec-modal{align-items:center;padding:20px;}}
.rec-box{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:22px;box-shadow:0 -12px 40px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto;}
@media(min-width:500px){.rec-box{border-radius:var(--radius);}}
.dow-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:12px 0;}
.dow-btn{border:1.5px solid var(--bd);border-radius:9px;padding:8px 4px;font-size:11px;font-weight:600;cursor:pointer;background:var(--s2);color:var(--mt);text-align:center;transition:all .15s;font-family:inherit;}
.dow-btn.on{border-color:var(--r);background:#fff5f5;color:var(--r);}
.rec-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--mt3);}
.rec-item:last-child{border-bottom:none;}
/* FREE TODAY WIDGET */
.free-today{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;}
.free-today-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mt2);margin-bottom:8px;}
.free-today-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;font-weight:500;}
.free-today-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gsw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:400;display:flex;align-items:flex-start;justify-content:flex-end;padding:62px 10px 0;}
.gsw-panel{background:var(--s);border-radius:var(--radius);box-shadow:var(--shadow-lg);min-width:240px;max-width:300px;overflow:hidden;border:1.5px solid var(--bd);}
.gsw-header{padding:12px 16px 8px;border-bottom:1px solid var(--bd);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt2);}
.gsw-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .1s;}
.gsw-item:hover,.gsw-item:active{background:var(--s2);}
.gsw-item.active{background:var(--abg);}

/* ════════════════════════════════════════════════════════════════
   UX / ACCESSIBILITY REFINEMENT LAYER
   Evidence-based improvements layered over the base design.
   Each block notes the principle it implements. Original class
   names and structure are preserved; the cascade does the work.
   ════════════════════════════════════════════════════════════════ */

/* ── 1. TOKENS — contrast & semantic colour ──────────────────────
   WCAG 2.1 AA requires 4.5:1 for body text, 3:1 for large/UI.
   The original --mt2 (#b5b1a8) scored ~2:1 on white — illegible.
   Darkened so the many small labels using it become readable.
   A dedicated --busy token separates "occupied" (a neutral fact)
   from --r error red. Pure red raises avoidance/alarm response
   (Elliot & Maier, color-in-context theory); a calmer clay tone
   communicates unavailability without constant low-grade stress,
   and amber-vs-green is far safer than red-vs-green for the ~8%
   of users with red–green colour-vision deficiency. */
:root{
  --mt:#5f5b54;           /* primary muted: ~5.2:1 on white */
  --mt2:#736d63;          /* secondary muted: ~4.7:1 — now AA */
  --busy:#c2543d;         /* de-alarmed "occupied" clay        */
  --busybg:#fdf4f2;
  --busyl:#f0c8c0;
  --focus:#5b4cf5;        /* focus-ring colour                 */
  --ring:0 0 0 3px rgba(91,76,245,.45);
  --shadow:0 1px 2px rgba(28,25,23,.05),0 4px 14px rgba(28,25,23,.06);
  --shadow-lg:0 10px 38px rgba(28,25,23,.14),0 3px 10px rgba(28,25,23,.07);
}

/* Smoother text rendering for legibility */
html,body{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

/* ── 2. VISIBLE FOCUS (WCAG 2.4.7) ───────────────────────────────
   Keyboard & switch users need to see where focus is. The base
   app exposed focus rings only on text inputs. :focus-visible keeps
   rings off mouse clicks but on for keyboard, so nothing looks noisy
   for pointer users while keyboard users get a clear, consistent cue. */
a,button,[tabindex],input,textarea,select,
.tab,.nbtn,.tbtn,.vdbtn,.mob-chip,.fi,.mfi,.qbtn,.ybtn,.color-swatch,
.code-pill,.gbadge,.uav,.bnav-item,.daymenu-item,.vdi,.gsw-item,
.chat-send,.chat-fab,.maps-fab,.mbtn,.plan-card,.dow-btn,.mpm{
  outline:none;
}
*:focus-visible{
  outline:none;
  box-shadow:var(--ring);
  position:relative;
  z-index:2;
}
.color-swatch:focus-visible,.uav:focus-visible,.chat-send:focus-visible,
.chat-fab:focus-visible,.maps-fab:focus-visible,.chat-close:focus-visible,
.day-note-close:focus-visible{ box-shadow:var(--ring); }

/* ── 3. REDUCED MOTION (WCAG 2.3.3 / vestibular safety) ──────────
   Honour the OS "reduce motion" setting: keep state changes but
   strip sliding/scaling/spinning that can trigger nausea or vertigo. */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
    scroll-behavior:auto !important;
  }
}

/* ── 4. TOUCH TARGETS (Fitts's Law / WCAG 2.5.5) ─────────────────
   On touch devices, targets below ~44px raise mis-tap rate and
   time-to-acquire. Enlarged only for coarse pointers so the tidy
   desktop layout is untouched. */
@media (pointer:coarse){
  .nbtn{ width:42px; height:42px; font-size:18px; }
  .tab,.tbtn,.vdbtn,.mob-chip,.addbtn{ min-height:40px; }
  .bnav-item{ min-height:56px; }
  .chat-send{ width:44px; height:44px; }
  .chat-close,.day-note-close{ width:40px; height:40px; }
  .color-swatch{ width:34px; height:34px; }
  .uav{ width:36px; height:36px; }
  .gsw-item,.daymenu-item,.vdi{ min-height:48px; }
  .dow-btn,.mpm{ min-height:44px; }
}

/* ── 5. PRESS FEEDBACK (Doherty threshold / perceived response) ──
   A sub-100ms tactile "give" on press makes actions feel instant
   and acknowledged, before any network round-trip resolves. */
button:not(:disabled):active,
.tab:active,.nbtn:active,.tbtn:active,.vdbtn:active,.mob-chip:active,
.code-pill:active,.gbadge:active,.uav:active,.mbtn:active,
.bnav-item:active{
  transform:scale(.97);
}
@media (prefers-reduced-motion: reduce){
  button:active,.tab:active,.nbtn:active,.bnav-item:active{ transform:none; }
}

/* ── 6. TYPOGRAPHY LEGIBILITY ────────────────────────────────────
   Raise the smallest structural/informational text off the 8–9px
   floor (below comfortable reading size) and lift weak greys.
   Decorative dots are left alone. */
.dayhdr{ font-size:11px; color:var(--mt); font-weight:600; }
.dn{ font-size:14px; }
@media(min-width:600px){ .dn{ font-size:15px; } }
.epill{ font-size:10px; line-height:1.45; padding:3px 7px; }
@media(min-width:600px){ .epill{ font-size:11px; } }
.dspill{ font-size:9px; opacity:.9; }
.bchip{ font-size:10px; opacity:1; }
.day-note-pill{ font-size:10px; }
.cl{ font-size:10px; color:var(--mt); }
.cc{ font-size:11px; color:var(--mt); }
.cv{ font-size:13px; }
.bnav-item{ font-size:11px; }
.vdsl,.slbl,.trip-section-title,.sbtitle,.gsw-header,.daymenu-header,
.free-today-title,.pending-title,.trip-inp-lbl,.trip-budget-title,
.brief-window-tag{ font-size:11px; color:var(--mt2); }
.chat-meta,.chat-day-sep,.gsw-code{ font-size:11px; }
.authnote,.plan-desc,.trip-card-desc{ line-height:1.55; }

/* ── 7. SEMANTIC "BUSY" COLOUR (re-point from alarm-red) ─────────── */
.mc.busy .dn{ color:var(--busy); }
.mc.today.busy .dn{ background:var(--busy); color:#fff; }
.dspill{ color:var(--busy); }
.bchip{ color:var(--busy); }
.dow-btn.on{ border-color:var(--busy); background:var(--busybg); color:var(--busy); }

/* ── 8. "TODAY" SALIENCE (Von Restorff / isolation effect) ───────
   The single most-referenced cell should pop. Keep the filled
   accent dot but give the whole cell a faint tint + ring so the
   eye lands on "today" instantly when scanning the grid. */
.mc.today{
  background:linear-gradient(180deg,rgba(91,76,245,.06),transparent 60%);
  box-shadow:inset 0 0 0 1.5px rgba(91,76,245,.28);
}
.mc.today .dn{ box-shadow:0 2px 6px rgba(91,76,245,.35); }

/* ── 9. HOVER AFFORDANCE on calendar cells (signifier clarity) ──── */
@media (hover:hover){
  .mc:hover{ background:#f6f4ff; }
  .epill{ transition:filter .12s; }
  .epill:hover{ filter:brightness(.94); }
}

/* ── 10. INTERACTIVE-ELEMENT CURSOR & DISABLED CLARITY ──────────── */
button,[role="button"],.tab,.mc,.epill,.fi,.gsw-item,.daymenu-item{ cursor:pointer; }
button:disabled,.authbtn:disabled,.upgrade-btn:disabled{ cursor:not-allowed; }

/* ── 11. SAFE-AREA & FAB STACKING (notched devices) ─────────────── */
.bottom-nav{ padding-bottom:env(safe-area-inset-bottom,0); }
@supports(padding:max(0px)){
  .chat-fab{ bottom:max(76px,calc(env(safe-area-inset-bottom,0) + 64px)); }
}

/* ── 12. MODAL / SHEET COMFORT (reading ease & reachability) ─────
   Slightly larger body line-height and a comfortable bottom inset
   so primary actions clear the home-indicator on phones. */
.mbox{ padding-bottom:max(22px,calc(env(safe-area-inset-bottom,0) + 16px)); }
.trip-body{ line-height:1.55; }

/* ── 13. INPUT ZOOM PREVENTION + COMFORT (iOS) ──────────────────
   iOS auto-zooms when an input's font-size is <16px. Inputs here
   were 13–15px, causing a jarring zoom on focus. Bump to 16px on
   touch so the viewport stays put and text stays legible. */
@media (pointer:coarse){
  .mef-inp,.mef-sel,.trip-inp,.gsw-inp,.authinp,.chat-input,.search-card input{
    font-size:16px;
  }
}

/* ── 14. SCROLLBAR & SELECTION polish (aesthetic-usability) ────── */
::selection{ background:rgba(91,76,245,.18); }
.calscroll::-webkit-scrollbar{ width:8px; height:8px; }
.calscroll::-webkit-scrollbar-thumb{ background:var(--bd2); border-radius:8px; }
.calscroll::-webkit-scrollbar-track{ background:transparent; }
</style>

var TK='sqcal_tk';
function saveTokens(access,refresh,exp){try{localStorage.setItem(TK,JSON.stringify({access:access,refresh:refresh,exp:exp}));}catch(e){}}

// ── Date helpers ──────────────────────────────────────────────
function dIM(y,m){return new Date(y,m+1,0).getDate();}
function fDOM(y,m){var d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function dKey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function addDays(dt,n){var d=new Date(dt);d.setDate(d.getDate()+n);return d;}
function wkStart(dt){var d=new Date(dt);var day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return d;}
function evStart(ev){
  if(ev.startDate&&ev.startDate!=='null'){var d=new Date(ev.startDate+'T00:00:00');if(!isNaN(d))return d;}
  return new Date(ev.y||2026,ev.m||0,ev.d1||1);
}
function evEnd(ev){
  if(ev.endDate&&ev.endDate!=='null'){var d=new Date(ev.endDate+'T23:59:59');if(!isNaN(d))return d;}
  var y=ev.y||2026,m=ev.m||0,d1=ev.d1||1,d2=ev.d2||d1;
  if(d2<d1)return new Date(y,m+1,d2,23,59,59);
  return new Date(y,m,d2,23,59,59);
}
function isPastEv(ev){return evEnd(ev)<NOW;}
function evOnDay(ev,y,m,d){try{var s=evStart(ev),e=evEnd(ev),dt=new Date(y,m,d);if(isNaN(s)||isNaN(e))return false;return dt>=s&&dt<=e;}catch(ex){return false;}}

function userName(){return S.profile&&S.profile.name||'';}
function groupCode(){
  if(!S.profile)return '';

  if(S.profile.activeGroupCode)return S.profile.activeGroupCode;
  if(S.profile.groupCode)return S.profile.groupCode;

  return groups.length?groups[0].code:'';

function groupName(){
  if(!S.profile)return '';

  var g=groups.find(function(g){return g.code===code;});

  return S.profile.groupName||'';

function myGroups(){
  if(!S.profile)return [];

  if(S.profile.groupCode)return [{code:S.profile.groupCode,name:S.profile.groupName||'Group',isAdmin:S.profile.isAdmin||false}];
  return [];
}

// ── Auth flow ─────────────────────────────────────────────────
// Called on page load — check for token in URL (magic link) or stored tokens
async function initAuth(){
  // Check URL for Supabase magic link tokens
  var hash=window.location.hash;
  if(hash&&hash.indexOf('access_token')>=0){
    var params=new URLSearchParams(hash.slice(1));
    var access=params.get('access_token');
    var refresh=params.get('refresh_token');
    var exp=params.get('expires_in');
    if(access){
      // Clean URL
      history.replaceState(null,'',window.location.pathname);
      var expAt=Date.now()+parseInt(exp||3600)*1000;
      saveTokens(access,refresh,expAt);
      S.authToken=access;S.refreshToken=refresh;
      var user=await authGetUser(access);
      if(user&&user.id){
        S.sbUser={id:user.id,email:user.email};
        await loadProfile();
        return;
      }
    }
  }
  // Check stored tokens
  var stored=loadTokens();
  if(stored&&stored.access){
    // Refresh if expired
    if(stored.exp&&Date.now()>stored.exp-60000){
      var refreshed=await authRefresh(stored.refresh);
      if(refreshed&&refreshed.access_token){
        saveTokens(refreshed.access_token,refreshed.refresh_token,Date.now()+(refreshed.expires_in||3600)*1000);
        stored.access=refreshed.access_token;stored.refresh=refreshed.refresh_token;
      } else {clearTokens();ss({screen:'auth'});return;}
    }
    S.authToken=stored.access;S.refreshToken=stored.refresh;
    var user2=await authGetUser(stored.access);
    if(user2&&user2.id){
      S.sbUser={id:user2.id,email:user2.email};
      await loadProfile();
      return;
    }
  }
  ss({screen:'auth'});
}

async function loadProfile(){
  // Profile stored per user ID
  var r=await sbGet('profile_'+S.sbUser.id);
  if(r){
    try{
      S.profile=JSON.parse(r.value);
      var code=groupCode();
      if(code){
        var memKey='sqc_m_'+code+'_'+S.profile.name.replace(/\s+/g,'_');
        var memR=await sbGet(memKey);
        var groups=myGroups();var g=groups.find(function(x){return x.code===code;});
        S.isAdmin=g?!!g.isAdmin:!!(S.profile.isAdmin);
        if(!memR&&!S.isAdmin){S.screen='waiting';render();return;}
        S.screen='app';render();loadAll();return;
      } else {
        S.screen='setup';render();return;
      }
    }catch(e){}
  }
  // No profile yet — need to set display name
  S.screen='setup';render();

}

async function doLogin(){
  ss({authLoading:true,authErr:''});
  var res=await authSignInWithEmail(S.authEmail.trim(),S.authPassword);
  if(res.access_token){
    saveTokens(res.access_token,res.refresh_token,Date.now()+(res.expires_in||3600)*1000);
    S.authToken=res.access_token;S.refreshToken=res.refresh_token;
    S.sbUser={id:res.user.id,email:res.user.email};
    S.authLoading=false;await loadProfile();
  } else {ss({authErr:res.error_description||res.msg||'Login failed. Check your email and password.',authLoading:false});}
}

async function doSignup(){
  if(!S.authEmail.trim()||!S.authPassword){ss({authErr:'Fill in email and password'});return;}
  if(S.authPassword.length<6){ss({authErr:'Password must be at least 6 characters'});return;}
  ss({authLoading:true,authErr:''});
  var res=await authSignUp(S.authEmail.trim(),S.authPassword);
  if(res.access_token){
    saveTokens(res.access_token,res.refresh_token,Date.now()+(res.expires_in||3600)*1000);
    S.authToken=res.access_token;S.refreshToken=res.refresh_token;
    S.sbUser={id:res.user.id,email:res.user.email};
    S.authLoading=false;await loadProfile();
  } else if(res.id||res.confirmation_sent_at){
    // Email confirmation required
    ss({authLoading:false,magicSent:true,authErr:''});
  } else {ss({authErr:res.error_description||res.msg||'Signup failed.',authLoading:false});}
}

async function doJoinGroup(){
  var code=(S.gswCode||S.joinCode).trim().toLowerCase();
  if(!code){ss({joinErr:'Enter a group code'});return;}
  ss({joinLoading:true,joinErr:''});
  var r=await sbGet('sqc_g_'+code);
  if(!r){ss({joinErr:'Group not found — check the code',joinLoading:false});return;}
  var g=JSON.parse(r.value);
  // Check username not taken
  var memKey='sqc_m_'+code+'_'+userName().replace(/\s+/g,'_');
  var existing=await sbGet(memKey);
  if(existing){
    try{
      var em=JSON.parse(existing.value);
      if(em.userId===S.sbUser.id){
        // Already a member — just switch to this group
        addGroupToProfile(code,g.name,false);
        await sbSet('profile_'+S.sbUser.id,JSON.stringify(S.profile));
        ss({joinLoading:false,showGroupSwitcher:false,gswCode:'',gswErr:''});
        switchGroup(code);return;
      }
      ss({joinErr:'Name "'+userName()+'" is already taken in this group.',joinLoading:false,gswErr:'Name "'+userName()+'" is already taken.',gswLoading:false});return;
    }catch(ex){}
  }
  // Check if admin exists
  var adminR=await sbGet('sqc_admin_'+code);
  if(!adminR){ss({joinErr:'Invalid group',joinLoading:false,gswErr:'Invalid group code.',gswLoading:false});return;}
  // Add to pending
  // Store pending per-user to avoid race condition when multiple people join simultaneously
  var myPendKey='sqc_pending_'+code+'_'+userName().replace(/\s+/g,'_');
  await sbSet(myPendKey,JSON.stringify({name:userName(),userId:S.sbUser.id,email:S.sbUser.email,t:Date.now()}));
  addGroupToProfile(code,g.name,false);
  await sbSet('profile_'+S.sbUser.id,JSON.stringify(S.profile));
  ss({joinLoading:false,gswLoading:false,showGroupSwitcher:false,screen:S.screen==='setup'?'waiting':S.screen});
  if(S.screen==='app')ss({screen:'waiting'});
}

async function doCreateGroup(){
  var gname=(S.gswGname||S.joinGname).trim();
  if(!gname){ss({joinErr:'Enter a group name',gswErr:'Enter a group name'});return;}
  ss({joinLoading:true,gswLoading:true,joinErr:'',gswErr:''});
  var c=Math.random().toString(36).slice(2,7).toUpperCase();
  var code=c.toLowerCase();
  var ok=await sbSet('sqc_g_'+code,JSON.stringify({name:gname,created:Date.now()}));
  if(!ok){ss({joinErr:'Could not connect.',joinLoading:false,gswErr:'Could not connect.',gswLoading:false});return;}
  await sbSet('sqc_admin_'+code,JSON.stringify({admin:userName(),userId:S.sbUser.id,created:Date.now()}));
  var st=avSt(userName());
  await sbSet('sqc_m_'+code+'_'+userName().replace(/\s+/g,'_'),JSON.stringify({name:userName(),bg:st.bg,col:st.col,userId:S.sbUser.id,t:Date.now()}));
  addGroupToProfile(code,gname,true);
  await sbSet('profile_'+S.sbUser.id,JSON.stringify(S.profile));
  S.isAdmin=true;S.newcode=c;
  ss({joinLoading:false,gswLoading:false,showGroupSwitcher:false,gswGname:'',joinGname:''});
  if(S.screen==='setup'){S.screen='app';render();loadAll();}
  else switchGroup(code);
}

function addGroupToProfile(code,name,isAdmin){
  if(!S.profile.groups)S.profile.groups=[];
  // Remove if already exists (update)
  S.profile.groups=S.profile.groups.filter(function(g){return g.code!==code;});
  S.profile.groups.push({code:code,name:name,isAdmin:!!isAdmin});
  S.profile.activeGroupCode=code;
  // Clear old single-group fields
  delete S.profile.groupCode;delete S.profile.groupName;
}

async function loadGroupInfo(){
  var r=await sbGet(ADK+groupCode());
  if(r){try{var g=JSON.parse(r.value);S.isAdmin=(g.userId===S.sbUser.id||g.admin===userName());}catch(e){}}
  if(S.isAdmin){
    // Load all pending members (stored per-user to avoid race conditions)
    var oldCount=S.pendingMembers.length;
    var pr=await sbList(PEK+groupCode()+'_');
    var pms=[];
    if(pr&&pr.keys){
      for(var pi=0;pi<pr.keys.length;pi++){
        var pk=pr.keys[pi];
        // Skip already-approved members (stored under sqc_m_ prefix)
        var pkStr=typeof pk==='object'?pk.key:pk;
        var pr2=await sbGet(pkStr);
        if(pr2){try{var pm=JSON.parse(pr2.value);if(pm&&pm.name&&!S.members.find(function(m){return m.name===pm.name;}))pms.push(pm);}catch(ex){}}
      }
    }
    S.pendingMembers=pms;
    if(S.pendingMembers.length!==oldCount)render();
  }
}

async function loadGav(){
  var res=await sbList(AVK+groupCode()+'_');if(!res||!res.keys)return;
  var all={},mm={};
  for(var i=0;i<res.keys.length;i++){
    var r=await sbGet(res.keys[i]);if(!r)continue;
    try{var obj=JSON.parse(r.value);mm[obj.mn]=obj.busy||[];(obj.busy||[]).forEach(function(d){if(!all[d])all[d]=[];all[d].push({name:obj.mn,status:'busy'});});}catch(e){}
  }
  S.gav=all;S.myBusy=mm[userName()]?arrToObj(mm[userName()]):{};
  // Update squad dots in-place without full re-render
  updateSquadDots();
  updateSidebarBestDays();
}

function updateSquadDots(){
  // Refresh busy dot counts on all visible cells without rebuilding calendar
  document.querySelectorAll('[data-cellkey]').forEach(function(cell){
    var key=cell.dataset.cellkey;
    var busyEntries=(S.gav[key]||[]).filter(function(e){return e.status==='busy';});
    // Update dots row
    var old=cell.querySelector('.sqdots');if(old)old.remove();
    if(busyEntries.length){
      var dots=el('div','sqdots');
      busyEntries.forEach(function(en){var d2=el('div','sqdot');d2.style.background=userColor(en.name);d2.title=en.name;dots.appendChild(d2);});
      var nr=cell.querySelector('.dnrow');if(nr)nr.after(dots);
    }
    // Update busy chip count
    var chip=cell.querySelector('.bchip');if(chip){chip.textContent=busyEntries.length+' busy';chip.style.display=busyEntries.length?'':'none';}
  });
}
function arrToObj(arr){var o={};arr.forEach(function(k){o[k]=true;});return o;}
function objToArr(o){return Object.keys(o);}
async function saveAv(busy){
  // Update sync dot without full re-render
  var dot=document.querySelector('.sync-dot');
  if(dot){dot.className='sync-dot busy';}
  var ok=await sbSet(AVK+groupCode()+'_'+userName().replace(/\s+/g,'_'),JSON.stringify({mn:userName(),busy:busy}));
  if(dot){dot.className='sync-dot '+(ok?'ok':'err');}
  if(ok){loadGav();regMem();}
}
function toggleDay(y,m,d){
  var key=dKey(y,m,d);
  if(S.myBusy[key])delete S.myBusy[key];else S.myBusy[key]=true;
  saveAv(objToArr(S.myBusy));
  // Update only the affected cells in-place — don't re-render the whole calendar
  var cells=document.querySelectorAll('[data-cellkey="'+key+'"]');
  cells.forEach(function(cell){
    var isBusy=!!S.myBusy[key];
    cell.classList.toggle('busy',isBusy);
    // Update number badge
    var dn=cell.querySelector('.dn');if(dn){dn.className='dn'+(isBusy?' busy':'');}
    // Update spill badge
    var old=cell.querySelector('.dspill');if(old)old.remove();
    if(isBusy){var sp=mk('span','dspill','busy');var nr=cell.querySelector('.dnrow');if(nr)nr.appendChild(sp);}
  });
  // Re-render just the sidebar best days (lightweight)
  updateSidebarBestDays();
  // If just marked busy, check if any suggested event spans this day
  if(S.myBusy[key])showConflictNudge(y,m,d);
}

function showConflictNudge(y,m,d){
  // Find any pinned suggested events that span this day
  var conflicts=S.aiResults.filter(function(ev){
    return ev.pinned&&evOnDay(ev,y,m,d);
  });
  if(!conflicts.length)return;
  // Remove any existing nudge
  document.querySelectorAll('.conflict-nudge').forEach(function(n){n.remove();});
  var ev=conflicts[0];
  var nudge=el('div','conflict-nudge');
  // Title
  var title=el('div','nudge-title');
  title.innerHTML='⚠️ Busy during <strong style="color:'+ev.c+'">'+ev.name+'</strong>';
  nudge.appendChild(title);
  // Subtitle — how many days to free up
  var evS=evStart(ev),evE=evEnd(ev);
  var days=[];for(var dt=new Date(evS),lim=0;dt<=evE&&lim++<60;dt.setDate(dt.getDate()+1)){days.push(new Date(dt));}
  var busyCount=days.filter(function(dt){return !!S.myBusy[dKey(dt.getFullYear(),dt.getMonth(),dt.getDate())];}).length;
  var sub=el('div','nudge-sub');
  sub.textContent='Busy '+busyCount+' of '+days.length+' day'+(days.length>1?'s':'')+'. Free up these days to join?';
  nudge.appendChild(sub);
  // Actions
  var acts=el('div','nudge-actions');
  var freeBtn=mk('button','nudge-free','✓ Free up & join');
  on(freeBtn,'click',function(){
    // First click — show confirmation state
    if(freeBtn.dataset.confirming!=='1'){
      freeBtn.dataset.confirming='1';
      freeBtn.textContent='Are you sure? Tap again';
      freeBtn.style.background='#f59e0b';
      // Reset after 4s if no second tap
      setTimeout(function(){
        if(freeBtn.dataset.confirming==='1'){
          freeBtn.dataset.confirming='0';
          freeBtn.textContent='✓ Free up & join';
          freeBtn.style.background='';
        }
      },4000);
      return;
    }
    // Second click — confirmed, actually free up

// ── .ics calendar parser ──────────────────────────────────────
function parseICS(text){
  var busyDays={};
  var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  // Unfold continuation lines
  lines=lines.replace(/\n[ \t]/g,'');
  var events=lines.split('BEGIN:VEVENT');
  events.shift(); // remove header
  events.forEach(function(ev){
    var dtstart=ev.match(/DTSTART(?:[^:]*)?:(\d{8})/);
    var dtend=ev.match(/DTEND(?:[^:]*)?:(\d{8})/);
    var status=ev.match(/STATUS:([^\n\r]+)/);
    var transp=ev.match(/TRANSP:([^\n\r]+)/);
    // Skip transparent/free events
    if(transp&&transp[1].trim()==='TRANSPARENT')return;
    if(status&&(status[1].trim()==='CANCELLED'||status[1].trim()==='FREE'))return;
    if(!dtstart)return;
    var parseDate=function(ds){return{y:parseInt(ds.slice(0,4)),m:parseInt(ds.slice(4,6))-1,d:parseInt(ds.slice(6,8))};};
    var s=parseDate(dtstart[1]);
    var e=dtend?parseDate(dtend[1]):{y:s.y,m:s.m,d:s.d};
    // Mark each day in range as busy
    var cur=new Date(s.y,s.m,s.d);
    var end2=new Date(e.y,e.m,e.d);
    // DTEND for all-day events is exclusive, so subtract 1 day
    end2.setDate(end2.getDate()-1);
    while(cur<=end2){
      var key=dKey(cur.getFullYear(),cur.getMonth(),cur.getDate());
      busyDays[key]=true;
      cur.setDate(cur.getDate()+1);
    }
  });
  return busyDays;
}

async function importCalendar(file){
  ss({calImportStatus:'parsing',calImportMsg:'Reading calendar…'});
  try{
    var text=await file.text();
    if(!text.includes('BEGIN:VCALENDAR')){ss({calImportStatus:'error',calImportMsg:'Not a valid .ics file. Export from Google Calendar, Apple Calendar or Outlook.'});return;}
    var busy=parseICS(text);
    var count=Object.keys(busy).length;
    if(!count){ss({calImportStatus:'error',calImportMsg:'No busy days found in this calendar. Make sure to export a calendar with events.'});return;}
    // Merge imported days with existing manual busy days
    S.importedBusy=busy;
    var merged=Object.assign({},S.myBusy,busy);
    S.myBusy=merged;
    await saveAv(objToArr(merged));
    ss({calImportStatus:'done',calImportMsg:count+' busy days imported successfully. Your availability has been updated.'});
  }catch(ex){
    ss({calImportStatus:'error',calImportMsg:'Error reading file: '+ex.message});
  }
}

    prompt='List real upcoming events in Europe and worldwide during '+mnames+' '+S.eyr+' covering: '+catStr+'.\n\nFor motorsport include: F1 Grand Prix, MotoGP, WRC rally, endurance racing (Le Mans 24h, Spa 24h), classic car events (Mille Miglia/1000 Miglia, Goodwood Festival of Speed, Concours d\'Elegance), hillclimbs, DTM, Formula E, historic racing.\nFor music include: major festivals (Glastonbury, Tomorrowland, Roskilde, Sziget, Sonar, Primavera Sound, Download), electronic, rock, jazz (Montreux).\nFor sports include: tennis majors (Roland Garros, Wimbledon), football/UEFA finals, cycling (Tour de France, Giro d\'Italia), athletics championships, sailing regattas.\nFor culture include: art biennales (Venice), film festivals (Cannes), Oktoberfest, carnival events, food festivals.\nReturn 15-20 diverse events across different types and countries.';
  }
  prompt+='\n\nReturn ONLY a valid JSON array with no text before or after it. Each object:\n{"name":"Full Event Name","type":"Category","location":"City, Country","dates":"DD-DD Mon YYYY","priceMin":NUMBER_OR_NULL,"priceMax":NUMBER_OR_NULL,"url":"https://exact-official-website.com"}\nFor prices: use real ticket prices in EUR if known (e.g. F1 grandstand = 150, MotoGP = 80, Glastonbury = 340). Use null only if truly unknown.\nFor URLs: use the REAL official website (e.g. formula1.com, motogp.com, wimbledon.com, goodwood.com). Do NOT use example.com or placeholder URLs.\nYear in dates must be '+S.eyr+'.';

  var useGemini=!!GEMINI_PROXY;
  if(useGemini){
    try{
      var gr=await fetch(GEMINI_PROXY,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(S.authToken||SB_KEY)},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:3000}})
      });
      if(gr.ok){
        var gd=await gr.json();
        var parts=((gd.candidates||[])[0]&&(gd.candidates[0].content||{}).parts)||[];
        // Gemini 2.5 uses thinking tokens - filter them out, keep only text parts
        var gtext=parts.filter(function(p){return p.text&&!p.thought;}).map(function(p){return p.text;}).join('');
        if(!gtext&&parts.length){
          // Fallback: take all text parts including thought
          gtext=parts.filter(function(p){return p.text;}).map(function(p){return p.text;}).join('');
        }
        var p2=parseEventJSON(gtext);
        if(p2&&p2.length){finishSearch(p2);return;}
        else{
          var reason=!gtext?'empty response':'JSON parse failed';
          console.warn('Gemini OK but '+reason+'. Raw:',gtext.slice(0,500));
          // Don't fall through to Claude — show Gemini-specific error
          ss({aiError:'Gemini returned an unexpected response ('+reason+'). Please try again.',aiLoading:false});return;
        }
      } else {
        var gerr=await gr.json().catch(function(){return{};});
        var geminiMsg=(gerr.error&&gerr.error.message)||'HTTP '+gr.status;
        console.warn('Gemini failed:',gr.status,gerr);
        if(gr.status===400||gr.status===403){
          ss({aiError:'Gemini error: '+geminiMsg+'. Check your key at aistudio.google.com',aiLoading:false});return;
        }
        if(gr.status===429){
          ss({aiError:'Gemini rate limit reached. Enable billing at console.cloud.google.com to remove limits.',aiLoading:false});return;
        }
        ss({aiError:'Gemini error '+gr.status+': '+geminiMsg,aiLoading:false});return;
      }
    }catch(ex){
      console.warn('Gemini exception:',ex.message);
      ss({aiError:'Gemini connection error: '+ex.message,aiLoading:false});return;
    }
  } else {
    ss({aiError:'No search API configured. Add a Gemini API key.',aiLoading:false});
  }
}

function parseEventJSON(text){
  if(!text)return null;
  try{
    var c=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var s=c.indexOf('['),e=c.lastIndexOf(']');
    if(s>=0&&e>s)return JSON.parse(c.slice(s,e+1));
  }catch(ex){
    try{var partial=text.slice(text.indexOf('['));var lc=partial.lastIndexOf('},');if(lc>0)return JSON.parse(partial.slice(0,lc+1)+']');}catch(ex2){}
  }
  return null;
}

function finishSearch(parsed){
  if(!parsed||!parsed.length)return;
  try{
    var ts=Date.now();
    var newResults=parsed.map(function(ev,i){
      var col=userColor(userName());
      return {
        id:'ai_'+i+'_'+ts,aiResult:true,
        name:String(ev.name||'Unknown event'),type:String(ev.type||'Event'),
        location:String(ev.location||ev.loc||''),dates:String(ev.dates||''),
        priceMin:(ev.priceMin!=null&&ev.priceMin!=='')?Number(ev.priceMin):null,
        priceMax:(ev.priceMax!=null&&ev.priceMax!=='')?Number(ev.priceMax):null,
        url:String(ev.url||''),
        c:col,cbg:userColorBg(userName()),
        loc:String(ev.location||ev.loc||''),ds:String(ev.dates||''),
        price:(ev.priceMin!=null&&ev.priceMin!==''&&ev.priceMin>0)?'€'+ev.priceMin+(ev.priceMax&&ev.priceMax!==ev.priceMin?'–€'+ev.priceMax:''):(ev.priceMax>0?'Up to €'+ev.priceMax:'Check site'),
        y:parseDateYear(ev.dates)||S.eyr,m:parseDateMonth(ev.dates),d1:parseDateD1(ev.dates),d2:parseDateD2(ev.dates),
        startDate:parseDateRange(String(ev.dates||'')).startDate,endDate:parseDateRange(String(ev.dates||'')).endDate,
        owner:userName(),
      };
    });
    // Keep previously pinned events — only replace non-pinned results
    var pinned=S.aiResults.filter(function(ev){return ev.pinned;});
    // Deduplicate: remove pinned events that appear in new results by name
    var newNames=newResults.map(function(e){return e.name.toLowerCase();});
    var keptPinned=pinned.filter(function(ev){return newNames.indexOf(ev.name.toLowerCase())<0;});
    S.aiResults=keptPinned.concat(newResults);
    sbSet(AIK+groupCode(),JSON.stringify(S.aiResults)).catch(function(){});
  }catch(ex){console.error('finishSearch error:',ex);ss({aiError:'Error processing results. Try again.',aiLoading:false});return;}
  ss({aiLoading:false,aiError:''});
}

function parseDateYear(ds){var m=(ds||'').match(/\b(20\d\d)\b/);return m?parseInt(m[1]):null;}
var MON={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseDateMonth(ds){if(!ds)return 0;var m=ds.toLowerCase().match(/[a-z]{3}/);return m&&MON[m[0]]!=null?MON[m[0]]:0;}
function parseDateD1(ds){var m=(ds||'').match(/(\d{1,2})/);return m?parseInt(m[1]):1;}
function parseDateD2(ds){var m=(ds||'').match(/\d{1,2}[^0-9]+(\d{1,2})/);return m?parseInt(m[1]):parseDateD1(ds);}
// Full date range parser — returns {startDate, endDate} ISO strings
// Handles: "29-31 May 2026", "30 May-01 Jun 2026", "13-15 Jun 2026", "30-01 Jun 2026"
function parseDateRange(ds){
  if(!ds)return {startDate:null,endDate:null};
  var yr=parseDateYear(ds)||2026;
  function pad(n){return String(n).padStart(2,'0');}
  // Find all month names and positions
  var months=[];var tmp=ds.toLowerCase();
  var pos=0,safety=0;
  while(pos<tmp.length&&safety++<500){
    var found=false;
    for(var mn in MON){if(tmp.substr(pos,mn.length)===mn){months.push({m:MON[mn],pos:pos});pos+=mn.length;found=true;break;}}
    if(!found)pos++;
  }
  // Find day numbers 1-31 (word boundary, exclude 4-digit year)
  var nums=[];var nm;var re=/\b(\d{1,2})\b/g;
  while((nm=re.exec(ds))!==null){var n=parseInt(nm[1]);if(n>=1&&n<=31)nums.push({n:n,pos:nm.index});}
  if(nums.length===0)return {startDate:null,endDate:null};
  var d1=nums[0].n,d2=nums.length>1?nums[nums.length-1].n:d1;
  if(months.length===0)return {startDate:null,endDate:null};
  if(months.length>=2){
    // Two months: "30 May-01 Jun 2026"
    return {startDate:yr+'-'+pad(months[0].m+1)+'-'+pad(d1),endDate:yr+'-'+pad(months[1].m+1)+'-'+pad(d2)};
  }
  // One month — determine if it belongs to start or end
  var mPos=months[0].m,mCharPos=months[0].pos;
  var firstNumCharPos=nums[0].pos;
  if(mCharPos<firstNumCharPos){
    // Month before numbers: "Jun 13-15" — same month for both
    return {startDate:yr+'-'+pad(mPos+1)+'-'+pad(d1),endDate:yr+'-'+pad(mPos+1)+'-'+pad(d2)};
  } else {
    // Month after numbers: "13-15 Jun" or "30-01 Jun"
    // Month name belongs to the END date
    var endM=mPos;
    // If d1 > d2, start is in the previous month (e.g. "30-01 Jun" = May 30 - Jun 1)
    var startM=d1>d2?(endM===0?11:endM-1):endM;
    var startYr=d1>d2&&endM===0?yr-1:yr;
    return {startDate:startYr+'-'+pad(startM+1)+'-'+pad(d1),endDate:yr+'-'+pad(endM+1)+'-'+pad(d2)};
  }
}

function updateChatFab(){
  var fab=document.querySelector('.chat-fab');
  if(!fab)return;
  var existing=fab.querySelector('.chat-unread');
  if(existing)existing.remove();
  if(S.chatUnread>0){
    var badge=document.createElement('span');
    badge.className='chat-unread';
    badge.textContent=S.chatUnread>9?'9+':String(S.chatUnread);
    fab.appendChild(badge);
  }
}

function updateChatInPlace(){
  var msgsEl=document.querySelector('.chat-msgs');
  if(!msgsEl)return;
  var atBottom=msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight<60;
  // Rebuild just the messages list
  msgsEl.innerHTML='';
  if(!S.chatMessages.length){
    var empty=document.createElement('div');empty.className='chat-empty';
    empty.innerHTML='<div class="chat-empty-icon">💬</div><div>No messages yet</div><div style="font-size:12px;margin-top:4px">Say hello to your squad!</div>';
    msgsEl.appendChild(empty);
  } else {
    var lastDay='';
    S.chatMessages.forEach(function(msg){
      var day=formatChatDay(msg.ts);
      if(day!==lastDay){
        var sep=document.createElement('div');sep.className='chat-day-sep';sep.textContent=day;msgsEl.appendChild(sep);lastDay=day;
      }
      var isMe=msg.name===userName();
      var wrap=document.createElement('div');wrap.className='chat-msg '+(isMe?'me':'them');
      var bubble=document.createElement('div');bubble.className='chat-bubble';bubble.textContent=msg.text;if(!isMe){bubble.style.borderLeft='3px solid '+userColor(msg.name);}
      var meta=document.createElement('div');meta.className='chat-meta';
      if(!isMe){var nm=document.createElement('span');nm.style.cssText='font-weight:700;color:'+userColor(msg.name);nm.textContent=msg.name;meta.appendChild(nm);var dot=document.createElement('span');dot.textContent=' · ';meta.appendChild(dot);}
      var ts=document.createElement('span');ts.textContent=formatChatTime(msg.ts);meta.appendChild(ts);
      wrap.appendChild(bubble);wrap.appendChild(meta);msgsEl.appendChild(wrap);
    });
  }
  if(atBottom)msgsEl.scrollTop=msgsEl.scrollHeight;
}

async function sendChatMessage(){
  var text=S.chatInput.trim();
  if(!text||!groupCode())return;
  var msg={id:Date.now()+'_'+Math.random().toString(36).slice(2),name:userName(),text:text,ts:Date.now()};
  var msgs=S.chatMessages.slice();
  msgs.push(msg);
  if(msgs.length>200)msgs=msgs.slice(-200);
  S.chatInput='';
  // Clear input field directly without render()
  var inp=document.querySelector('.chat-input');if(inp){inp.value='';inp.style.height='auto';}
  var sendBtn=document.querySelector('.chat-send');if(sendBtn)sendBtn.disabled=true;
  S.chatMessages=msgs;
  updateChatInPlace();
  scrollChatToBottom();
  await sbSet(CHAT_KEY+groupCode(),JSON.stringify(msgs));
}

function scrollChatToBottom(){
  setTimeout(function(){
    var el2=document.querySelector('.chat-msgs');
    if(el2)el2.scrollTop=el2.scrollHeight;
  },50);
}

function startChatPoll(){
  if(chatPollTimer)return;
  chatPollTimer=setInterval(function(){
    if(groupCode())loadChatMessages(true);
  },1500);
}

function formatChatTime(ts){
  var d=new Date(ts);
  var now=new Date();
  var diff=now-d;
  if(diff<60000)return 'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(d.toDateString()===now.toDateString())return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  return d.getDate()+' '+MS[d.getMonth()];
}

function formatChatDay(ts){
  var d=new Date(ts);
  var now=new Date();
  if(d.toDateString()===now.toDateString())return 'Today';
  var yest=new Date(now);yest.setDate(yest.getDate()-1);
  if(d.toDateString()===yest.toDateString())return 'Yesterday';
  return d.getDate()+' '+MN[d.getMonth()];
}

async function doPlacesSearch(){
  if(S.aiLoading)return;
  if(!canSearch()){showPaywall('search');return;}
  var q=S.placeQuery.trim();
  if(!q){alert('Type what you are looking for — e.g. "cool pubs in Vilnius"');return;}
  incrementSearchQuota();
  ss({aiLoading:true,aiError:''});
  var prompt='Suggest 8-10 real places matching: "'+q+'".\n'+
    'For each place include: full name, type (pub/restaurant/bar/cafe/park/etc), city, full address, short description (1 sentence, what makes it special), price range (€/€€/€€€/€€€€), approximate opening hours, and the exact Google Maps search query to find it.\n'+
    'Return ONLY a valid JSON array:\n'+
    '[{"name":"Place Name","type":"pub","city":"Vilnius","address":"Gedimino pr. 1, Vilnius","description":"One-line what makes it special","priceRange":"€€","hours":"16:00–02:00","mapsQuery":"Place Name Vilnius Lithuania","rating":4.5}]\n'+
    'Use real places that actually exist. Rating out of 5.';
  try{
    var gr=await fetch(GEMINI_PROXY,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(S.authToken||SB_KEY)},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:3000}})
    });
    if(gr.ok){
      var gd=await gr.json();
      var parts=((gd.candidates||[])[0]&&(gd.candidates[0].content||{}).parts)||[];
      var gtext=parts.filter(function(p){return p.text&&!p.thought;}).map(function(p){return p.text;}).join('');
      var parsed=parseEventJSON(gtext);
      if(parsed&&parsed.length){
        S.placeResults=parsed;
        ss({aiLoading:false,aiError:''});
        return;
      }
    }
    ss({aiError:'Could not find places. Try rephrasing.',aiLoading:false});
  }catch(ex){ss({aiError:'Network error: '+ex.message,aiLoading:false});}
}
